[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

# ── WEB SERVICE ───────────────────────────────────────────────────────────
[deploy]
startCommand = "node server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
healthcheckPath = "/health"
healthcheckTimeout = 30

[environments.production]
NODE_ENV = "production"
PORT = "5000"

# ── HOW TO ADD WORKER SERVICES ────────────────────────────────────────────
#
# In Railway dashboard → New Service → from same GitHub repo:
#
# CAMPAIGN WORKER:
#   Start Command: node workers/campaign.worker.js
#   Same env vars as web service
#
# MEDIA WORKER:
#   Start Command: node workers/media.worker.js
#   Same env vars as web service
#
# Or use railway.json for multi-service (see below)
